name: Tests

# Run manually from the Actions tab in the GitHub web UI.
on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration to test
        type: choice
        default: Release
        options:
          - Release
          - Debug

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Trust HTTPS developer certificate
        # The Aspire app serves its endpoints over the ASP.NET Core HTTPS dev cert,
        # which is untrusted on a fresh runner. Without this the AppHost health-check
        # and inter-service HTTP clients fail the TLS handshake (UntrustedRoot), the
        # resources never report healthy, and the test times out. `--trust` is
        # unreliable headless on Linux, so export the cert and add it to the OS trust
        # store, which .NET's OpenSSL-based HttpClient honors.
        run: |
          dotnet dev-certs https --export-path "$RUNNER_TEMP/aspnetcore-dev-cert.crt" --format Pem --no-password
          sudo cp "$RUNNER_TEMP/aspnetcore-dev-cert.crt" /usr/local/share/ca-certificates/aspnetcore-dev-cert.crt
          sudo update-ca-certificates

      - name: Restore
        run: dotnet restore ./starterapp.Tests/starterapp.Tests.csproj

      - name: Test
        run: >
          dotnet test ./starterapp.Tests/starterapp.Tests.csproj
          --no-restore
          --configuration ${{ inputs.configuration }}
          --logger "trx;LogFileName=test-results.trx"
          --logger "console;verbosity=detailed"
          --results-directory ./TestResults
          --blame-hang-timeout 3m
          --blame-hang-dump-type full

      - name: Publish test report
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }}
        with:
          name: Test results
          path: TestResults/*.trx
          reporter: dotnet-trx

      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: TestResults/
          if-no-files-found: error
